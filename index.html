:root{

--primary:hsl(190,90%,50%);--primary-fg:hsl(230,60%,8%);
--secondary:hsl(260,60%,55%);--accent:hsl(280,70%,60%);
--muted:hsl(230,30%,20%);--muted-fg:hsl(215,20%,60%);
--border:hsl(230,30%,22%);--destructive:hsl(0,84%,60%);
--success:hsl(142,70%,45%);--warning:hsl(38,92%,50%);
--glass-bg:hsla(230,40%,18%,0.6);--glass-border:hsla(210,40%,96%,0.1);
--glass-shadow:0 8px 32px hsla(230,60%,4%,0.4);
--radius:1rem;
}
*{margin:0;padding:0;box-sizing:border-box;border-color:var(--border)}
body{background:linear-gradient(135deg,hsl(230,60%,8%),hsl(260,50%,12%),hsl(230,50%,10%));
color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;overflow-x:hidden}
.glass{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);border-radius:var(--radius)}
.glass-l{background:hsla(230,40%,22%,0.4);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
border:1px solid var(--glass-border);border-radius:var(--radius)}
.btn{background:linear-gradient(135deg,hsl(190,90%,50%),hsl(200,90%,45%));color:var(--primary-fg);
font-weight:700;border-radius:var(--radius);border:none;cursor:pointer;
box-shadow:0 4px 15px hsla(190,90%,50%,0.3);transition:transform .2s}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:default}
.btn-g{background:hsla(210,40%,96%,0.1);border:1px solid var(--glass-border);color:var(--fg);
font-weight:600;border-radius:var(--radius);backdrop-filter:blur(10px);cursor:pointer;transition:all .2s}
.btn-g:active{transform:scale(.97);background:hsla(210,40%,96%,0.15)}
.grad-text{background:linear-gradient(135deg,hsl(190,90%,50%),hsl(280,70%,60%));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tab-act{background:linear-gradient(135deg,hsl(190,90%,50%),hsl(200,90%,45%));color:var(--primary-fg);
font-weight:700;box-shadow:0 2px 10px hsla(190,90%,50%,0.3)}
input,select,textarea{background:hsla(230,30%,20%,0.5);border:1px solid var(--border);color:var(--fg);
border-radius:8px;padding:8px 12px;font-size:14px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{box-shadow:0 0 0 2px var(--primary)}
input::placeholder,textarea::placeholder{color:var(--muted-fg)}
.no-scroll{-ms-overflow-style:none;scrollbar-width:none}.no-scroll::-webkit-scrollbar{display:none}
.alert-u{background:linear-gradient(135deg,hsla(0,84%,60%,.2),hsla(0,84%,40%,.2));border:1px solid hsla(0,84%,60%,.3);border-radius:var(--radius)}
.alert-up{background:linear-gradient(135deg,hsla(38,92%,50%,.2),hsla(38,92%,40%,.2));border:1px solid hsla(38,92%,50%,.3);border-radius:var(--radius)}
.alert-c{background:linear-gradient(135deg,hsla(142,70%,45%,.2),hsla(142,70%,35%,.2));border:1px solid hsla(142,70%,45%,.3);border-radius:var(--radius)}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.spinner{width:32px;height:32px;border:2px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
.dot{width:8px;height:8px;background:var(--muted-fg);border-radius:50%;display:inline-block;animation:bounce 1s infinite}
.bar{height:6px;border-radius:3px;background:var(--muted);overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}

const getTag=(avg,dg)=>{
  const di=DISCIPLINE_GRADES.indexOf(dg);

auth.onAuthStateChanged(u=>{
  currentUser=u;
  unsubs.forEach(fn=>fn());unsubs=[];

  else renderLogin();
});

function setupListeners(){
  const uid=currentUser.uid;
  const r1=db.ref(`users/${uid}/students`);
  const cb1=r1.on("value",snap=>{
    const d=snap.val();
    students=d?Object.values(d):[];
    if(activeTab==="students"||activeTab==="marks"||activeTab==="picker"||activeTab==="reports")renderContent();
    renderStats();
  });
  unsubs.push(()=>r1.off("value",cb1));

  const r2=db.ref(`users/${uid}/reports`);
  const cb2=r2.on("value",snap=>{reports=snap.val()||{};if(activeTab==="reports")renderContent();});
  unsubs.push(()=>r2.off("value",cb2));

  const r3=db.ref(`users/${uid}/timetable`);
  const cb3=r3.on("value",snap=>{const d=snap.val();timetable=d?Object.values(d):[];renderPeriodTracker();if(activeTab==="timetable")renderContent();});
  unsubs.push(()=>r3.off("value",cb3));

  const r4=db.ref("examSchedule");
  const cb4=r4.on("value",snap=>{const d=snap.val();exams=d?Object.values(d):[];renderAlertBanner();if(activeTab==="timetable")renderContent();});
  unsubs.push(()=>r4.off("value",cb4));

  const r5=db.ref("alerts");
  const cb5=r5.on("value",snap=>{const d=snap.val();alerts=d?Object.values(d).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)):[];renderAlertBanner();if(activeTab==="alerts")renderContent();});
  unsubs.push(()=>r5.off("value",cb5));
}

function renderAlertBanner(){
  const el=document.getElementById("alertBanner");if(!el)return;
  const examAlerts=exams.map(e=>{

    if(d<0)return null;if(d===0)return{id:"ex-"+e.id,title:`${e.subject} Exam Today!`,type:"urgent"};

function renderPeriodTracker(){
  const el=document.getElementById("periodTracker");if(!el)return;
  const now=new Date(),dName=DAYS[now.getDay()-1],nowM=now.getHours()*60+now.getMinutes();
  if(!dName){el.innerHTML=`<div class="glass-l" style="padding:16px;text-align:center"><p style="font-size:14px;color:var(--muted-fg)">🎉 It's the weekend!</p></div>`;return;}
  if(nowM>=toMin("14:40")){el.innerHTML=`<div class="glass-l" style="padding:16px;text-align:center"><p style="font-size:14px;color:var(--muted-fg)">🏠 School day is over!</p></div>`;return;}
  if(nowM<toMin("08:30")){el.innerHTML=`<div class="glass-l" style="padding:16px;display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:12px;background:hsla(190,90%,50%,.2);display:flex;align-items:center;justify-content:center"><span style="color:var(--primary)">${icons.clock}</span></div><div><p style="font-size:12px;color:var(--muted-fg)">School starts in</p><p style="font-size:14px;font-weight:700">${fmtMin(toMin("08:30")-nowM)}</p></div></div>`;return;}
  const ci=SCHEDULE.findIndex(s=>nowM>=toMin(s.start)&&nowM<toMin(s.end));
  const cur=ci>=0?SCHEDULE[ci]:null;
  const nxt=ci>=0&&ci<SCHEDULE.length-1?SCHEDULE[ci+1]:null;
  if(!cur){el.innerHTML="";return;}
  const tl=toMin(cur.end)-nowM;
  const prog=((toMin(cur.end)-toMin(cur.start)-tl)/(toMin(cur.end)-toMin(cur.start)))*100;
  const tSubs={};timetable.filter(e=>e.day===dName).forEach(e=>{tSubs[e.period]=e.subject});
  const pn=getPNum(cur.label),curSubj=pn?tSubs[pn]:null;
  const nn=nxt?getPNum(nxt.label):null,nxtSubj=nn?tSubs[nn]:null;
  const clr=cur.type==="break"?"var(--warning)":cur.type==="assembly"?"var(--accent)":"var(--primary)";
  el.innerHTML=`
  <div style="padding:16px;border-radius:16px;background:${cur.type==="break"?"hsla(38,92%,50%,.1)":cur.type==="assembly"?"hsla(280,70%,60%,.1)":"hsla(190,90%,50%,.1)"};border:1px solid ${cur.type==="break"?"hsla(38,92%,50%,.2)":cur.type==="assembly"?"hsla(280,70%,60%,.2)":"hsla(190,90%,50%,.2)"}">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:40px;height:40px;border-radius:12px;background:${cur.type==="break"?"hsla(38,92%,50%,.2)":cur.type==="assembly"?"hsla(280,70%,60%,.2)":"hsla(190,90%,50%,.2)"};display:flex;align-items:center;justify-content:center"><span style="color:${clr}">${icons.clock}</span></div>
      <div style="flex:1"><p style="font-size:12px;color:var(--muted-fg)">Now</p><p style="font-size:14px;font-weight:700">${curSubj||cur.label}</p>${curSubj?`<p style="font-size:10px;color:var(--muted-fg)">${cur.label}</p>`:""}</div>
      <div style="text-align:right"><p style="font-size:18px;font-weight:700">${fmtMin(tl)}</p><p style="font-size:10px;color:var(--muted-fg)">left</p></div>
    </div>
    <div style="margin-top:12px;height:6px;border-radius:3px;background:hsla(230,30%,20%,.5);overflow:hidden"><div style="height:100%;border-radius:3px;background:${clr};width:${prog}%;transition:width .5s"></div></div>
  </div>
  ${nxt?`<div class="glass-l" style="padding:12px;display:flex;align-items:center;gap:12px;margin-top:8px"><span style="color:var(--muted-fg)">${icons.arrow}</span><div style="flex:1"><p style="font-size:10px;color:var(--muted-fg)">Up next</p><p style="font-size:12px;font-weight:500">${nxtSubj||nxt.label}${nxtSubj?` <span style="color:var(--muted-fg)">· ${nxt.label}</span>`:""}</p></div><span style="font-size:10px;color:var(--muted-fg)">${nxt.start}</span></div>`:""}`;
}

function drawBarChart(){
  const canvas=document.getElementById("barChart");if(!canvas)return;
  const ctx=canvas.getContext("2d");
  canvas.width=canvas.offsetWidth*2;canvas.height=320;
  ctx.scale(2,2);
  const w=canvas.offsetWidth,h=160,pad=30,barW=Math.min(30,(w-pad*2)/students.length-4);
  ctx.clearRect(0,0,w,h);
  // Grid
  ctx.strokeStyle="hsla(230,30%,22%,0.5)";ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pad+(h-pad*2)*(1-i/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(w-10,y);ctx.stroke();
    ctx.fillStyle="hsl(215,20%,60%)";ctx.font="9px sans-serif";ctx.fillText(i*25,5,y+3);}
  students.forEach((s,i)=>{
    const avg=Math.round(getAvg(s.id));
    const bh=(avg/100)*(h-pad*2);
    const x=pad+i*((w-pad*2)/students.length)+(((w-pad*2)/students.length)-barW)/2;
    const y=h-pad-bh;
    ctx.fillStyle=avg>=70?"hsl(142,70%,45%)":avg>=40?"hsl(38,92%,50%)":"hsl(0,84%,60%)";
    ctx.beginPath();ctx.roundRect(x,y,barW,bh,3);ctx.fill();
    ctx.fillStyle="hsl(215,20%,60%)";ctx.font="8px sans-serif";ctx.textAlign="center";
    const name=s.name.length>6?s.name.slice(0,6)+"…":s.name;
    ctx.fillText(name,x+barW/2,h-pad+12);
  });
}

    f.innerHTML=`<input id="tn-${id}" placeholder="Test name" style="flex:1;padding:6px 8px;font-size:12px"/><input id="ts-${id}" type="number" placeholder="Score" style="width:50px;padding:6px;font-size:12px;text-align:center"/><input id="tm-${id}" type="number" placeholder="Max" value="100" style="width:50px;padding:6px;font-size:12px;text-align:center"/><button id="confirmTest-${id}" class="btn" style="padding:6px 10px;font-size:12px;border-radius:8px">✓</button>`;
    document.getElementById("confirmTest-"+id).onclick=()=>{
      const name=document.getElementById("tn-"+id).value.trim();if(!name)return;
      const sc=Math.max(0,Number(document.getElementById("ts-"+id).value)||0);
      const mx=Math.max(1,Number(document.getElementById("tm-"+id).value)||100);
      const nr={...r,tests:[...(r.tests||[]),{testName:name,score:Math.min(sc,mx),maxScore:mx}]};
      reports[id]=nr;db.ref(`users/${uid}/reports`).set(reports);renderExpanded(id);
    };
  };
  exp.querySelectorAll("[data-rmtest]").forEach(b=>b.onclick=()=>{
    const nr={...r,tests:[...(r.tests||[])]};nr.tests.splice(parseInt(b.dataset.rmtest),1);
    reports[id]=nr;db.ref(`users/${uid}/reports`).set(reports);renderExpanded(id);
  });
}

  </div>
  ${pickerUsed.size?`<div class="glass-l" style="padding:16px"><p style="font-size:12px;color:var(--muted-fg);margin-bottom:8px">Already picked:</p><div style="display:flex;flex-wrap:wrap;gap:6px">${students.filter(s=>pickerUsed.has(s.id)).map(s=>`<span style="font-size:12px;background:hsla(190,90%,50%,.2);color:var(--primary);padding:4px 8px;border-radius:6px">${s.name}</span>`).join("")}</div></div>`:""}`;
  document.getElementById("pickBtn").onclick=()=>{
    const avails=students.filter(s=>!pickerUsed.has(s.id));if(!avails.length)return;
    pickerSpinning=true;let count=0;

      const r=students[Math.floor(Math.random()*students.length)];
      document.getElementById("pickerResult").innerHTML=`<p style="font-size:28px;font-weight:700;color:var(--muted-fg)">${r.name}</p>`;
      count++;if(count>10){clearInterval(iv);
        const final=avails[Math.floor(Math.random()*avails.length)];
        pickerPicked=final;pickerUsed.add(final.id);pickerSpinning=false;
        document.getElementById("pickerResult").innerHTML=`<p style="font-size:28px;font-weight:700" class="grad-text">${final.name}</p><p style="font-size:12px;color:var(--muted-fg);margin-top:8px">🎯 Selected!</p>`;
        renderPicker(el);
      }
    },80);
  };

}

// ===== Gemini AI Helpers =====
async function fileToBase64(file){
  return new Promise(r=>{const rd=new FileReader();rd.onload=()=>r(rd.result.split(",")[1]);rd.readAsDataURL(file)});
}

async function extractTT(file){
  const b64=await fileToBase64(file);
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType:file.type||"image/jpeg",data:b64}},{text:`Extract timetable from this image. Return ONLY JSON array: [{className,period,subject,startTime,endTime,day}]. Days: Monday-Saturday. Times: HH:MM. Return [] if can't extract.`}]}]})
  });
  const d=await res.json();const t=d?.candidates?.[0]?.content?.parts?.[0]?.text||"[]";
  const m=t.match(/\[[\s\S]*\]/);if(!m)return[];
  try{return JSON.parse(m[0]).map((e,i)=>({id:`${Date.now()}_${i}`,className:e.className||"General",period:e.period||i+1,subject:e.subject||"Unknown",startTime:e.startTime||"08:00",endTime:e.endTime||"08:45",day:e.day||"Monday"}))}catch{return[]}
}

async function extractExams(file){
  const b64=await fileToBase64(file);
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType:file.type||"image/jpeg",data:b64}},{text:`Extract exam schedule. Return ONLY JSON array: [{subject,date(YYYY-MM-DD),startTime(HH:MM),duration(mins)}]. Return [] if can't.`}]}]})
  });
  const d=await res.json();const t=d?.candidates?.[0]?.content?.parts?.[0]?.text||"[]";
  const m=t.match(/\[[\s\S]*\]/);if(!m)return[];
  try{return JSON.parse(m[0]).map((e,i)=>({id:`${Date.now()}_${i}`,subject:e.subject||"Unknown",date:e.date||new Date().toISOString().split("T")[0],startTime:e.startTime||"09:00",duration:e.duration||180}))}catch{return[]}
}

    ${admin?`<button data-rmalert="${a.id}" style="padding:6px;background:none;border:none;cursor:pointer;color:var(--muted-fg)">${icons.trash}</button>`:""}
  </div>`;}).join("");
  if(!alerts.length)html+=`<div style="text-align:center;padding:48px 0;color:var(--muted-fg);font-size:14px">No alerts yet.</div>`;
  el.innerHTML=html;
  if(admin){
    document.getElementById("addAlert")?.addEventListener("click",()=>{
      const f=document.getElementById("alertAddForm");f.style.display="block";
      let aType="info";
      const renderForm=()=>{
        f.innerHTML=`<div class="glass-l" style="padding:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><p style="font-size:14px;font-weight:600">New Alert</p><button id="alertClose" style="background:none;border:none;cursor:pointer;color:var(--muted-fg)">${icons.x}</button></div>
          <input id="alertTitle" placeholder="Alert title" style="width:100%;margin-bottom:8px"/>
          <textarea id="alertMsg" placeholder="Alert message" rows="2" style="width:100%;margin-bottom:8px;resize:none"></textarea>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px">${["urgent","upcoming","completed","info"].map(t=>`<button data-atype="${t}" class="${aType===t?"tab-act":""}" style="padding:6px;font-size:10px;font-weight:600;border-radius:8px;border:none;cursor:pointer;${aType!==t?"background:hsla(230,40%,22%,.4);color:var(--muted-fg)":""}">${typeMap[t].l}</button>`).join("")}</div>
          <button id="alertConfirm" class="btn" style="width:100%;padding:10px;font-size:14px">Broadcast Alert</button></div>`;
        document.getElementById("alertClose").onclick=()=>f.style.display="none";
        f.querySelectorAll("[data-atype]").forEach(b=>b.onclick=()=>{aType=b.dataset.atype;renderForm()});
        document.getElementById("alertConfirm").onclick=()=>{
          const t=document.getElementById("alertTitle").value.trim(),m=document.getElementById("alertMsg").value.trim();
          if(!t||!m)return;
          const a={id:Date.now().toString(),title:t,message:m,type:aType,createdAt:new Date().toISOString(),createdBy:currentUser.email};
          const upd=[...alerts,a];db.ref("alerts").set(Object.fromEntries(upd.map(x=>[x.id,x])));
          f.style.display="none";
        };
      };renderForm();
    });
    el.querySelectorAll("[data-rmalert]").forEach(b=>b.onclick=()=>{
      const upd=alerts.filter(a=>a.id!==b.dataset.rmalert);
      db.ref("alerts").set(upd.length?Object.fromEntries(upd.map(a=>[a.id,a])):null);
    });
  }
}

// ===== Question Paper Generator =====
let qpConfig={difficulty:"medium",mcqs:10,shortAnswer:5,longAnswer:3,fillBlanks:5,trueFalse:5,totalMarks:80,subject:"",className:"",timeAllowed:"3 hours",instructions:""};
let qpText="",qpPaper=null;
function renderQPaper(el){
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px" class="fade-in">
    <div><h2 style="font-size:18px;font-weight:700">Question Paper</h2><p style="font-size:12px;color:var(--muted-fg)">Upload content → AI generates paper</p></div>
    <button id="qpSettings" class="glass-l" style="padding:10px;border-radius:12px;cursor:pointer;color:var(--muted-fg);background:none">${icons.settings}</button>
  </div>
  <div id="qpConfig" style="display:none;margin-bottom:12px"></div>
  <div id="qpStatus" style="display:none;margin-bottom:12px"></div>
  <input type="file" id="qpFile" accept="image/*,.pdf,.txt" style="display:none"/>
  <button id="qpUploadBtn" class="glass-l" style="width:100%;padding:24px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;color:var(--muted-fg);background:none;margin-bottom:16px">${icons.upload}<span style="font-size:14px;font-weight:500">${qpText?"📄 Content loaded · Tap to replace":"Upload textbook page / chapter"}</span><span style="font-size:10px">Image, PDF, or text file</span></button>
  ${qpText?`<button id="qpGenerate" class="btn" style="width:100%;padding:14px;font-size:14px;margin-bottom:16px">🧠 Generate Question Paper</button>`:""}
  ${qpPaper?`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><p style="font-size:14px;font-weight:700">Generated Paper</p><button id="qpDlPdf" class="btn" style="padding:8px 12px;font-size:12px;border-radius:12px;display:flex;align-items:center;gap:6px">${icons.download} PDF</button></div><div class="glass-l" style="padding:16px;max-height:400px;overflow-y:auto"><pre style="font-size:12px;white-space:pre-wrap;font-family:inherit;line-height:1.6">${qpPaper}</pre></div>`:""}
  ${!qpText&&!qpPaper?`<div style="text-align:center;padding:24px 0;color:var(--muted-fg);font-size:14px"><p>📝 How it works:</p><p style="font-size:12px;margin-top:8px">1. Upload textbook chapter</p><p style="font-size:12px">2. Configure difficulty & question types</p><p style="font-size:12px">3. AI generates question paper</p><p style="font-size:12px">4. Download as PDF</p></div>`:""}`;
  el.innerHTML=html;
  document.getElementById("qpUploadBtn").onclick=()=>document.getElementById("qpFile").click();
  document.getElementById("qpFile").onchange=async(ev)=>{
    const f=ev.target.files[0];if(!f)return;
    if(f.type.startsWith("image/")||f.type==="application/pdf"){
      showQpMsg("Extracting text with AI...",true);
      try{const b64=await fileToBase64(f);
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{inlineData:{mimeType:f.type,data:b64}},{text:"Extract ALL text content from this textbook page. Return full text preserving structure."}]}]})});
        const d=await res.json();const t=d?.candidates?.[0]?.content?.parts?.[0]?.text||"";
        if(t){qpText=t;showQpMsg(`✅ Extracted ${t.length} chars`);renderQPaper(el);}else showQpMsg("Could not extract text.");
      }catch{showQpMsg("Extraction failed.");}
    }else{const rd=new FileReader();rd.onload=()=>{qpText=rd.result;showQpMsg(`✅ Loaded ${f.name}`);renderQPaper(el)};rd.readAsText(f);}
  };
  document.getElementById("qpSettings")?.addEventListener("click",()=>{
    const c=document.getElementById("qpConfig");c.style.display=c.style.display==="none"?"block":"none";
    if(c.style.display==="block"){
      c.innerHTML=`<div class="glass-l" style="padding:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><p style="font-size:14px;font-weight:600">Paper Settings</p><button id="qpCfgClose" style="background:none;border:none;cursor:pointer;color:var(--muted-fg)">${icons.x}</button></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><input id="qpSubj" value="${qpConfig.subject}" placeholder="Subject"/><input id="qpClass" value="${qpConfig.className}" placeholder="Class"/></div>
        <p style="font-size:12px;color:var(--muted-fg);margin-bottom:4px">Difficulty</p>
        <div style="display:flex;gap:6px;margin-bottom:8px">${["easy","medium","hard","mixed"].map(d=>`<button data-diff="${d}" class="${qpConfig.difficulty===d?"btn":""}" style="flex:1;padding:6px;font-size:12px;border-radius:8px;border:none;cursor:pointer;text-transform:capitalize;${qpConfig.difficulty!==d?"background:hsla(230,30%,20%,.5);color:var(--muted-fg)":""}">${d}</button>`).join("")}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div><label style="font-size:10px;color:var(--muted-fg)">MCQs</label><input id="qpMcq" type="number" min="0" value="${qpConfig.mcqs}" style="width:100%"/></div>
          <div><label style="font-size:10px;color:var(--muted-fg)">Short Ans</label><input id="qpShort" type="number" min="0" value="${qpConfig.shortAnswer}" style="width:100%"/></div>
          <div><label style="font-size:10px;color:var(--muted-fg)">Long Ans</label><input id="qpLong" type="number" min="0" value="${qpConfig.longAnswer}" style="width:100%"/></div>
          <div><label style="font-size:10px;color:var(--muted-fg)">Fill Blanks</label><input id="qpFill" type="number" min="0" value="${qpConfig.fillBlanks}" style="width:100%"/></div>
          <div><label style="font-size:10px;color:var(--muted-fg)">True/False</label><input id="qpTf" type="number" min="0" value="${qpConfig.trueFalse}" style="width:100%"/></div>
          <div><label style="font-size:10px;color:var(--muted-fg)">Total Marks</label><input id="qpMarks" type="number" min="1" value="${qpConfig.totalMarks}" style="width:100%"/></div>
        </div>
        <input id="qpTime" value="${qpConfig.timeAllowed}" placeholder="Time (e.g. 3 hours)" style="width:100%;margin-bottom:8px"/>
        <input id="qpInstr" value="${qpConfig.instructions}" placeholder="Additional instructions" style="width:100%;margin-bottom:8px"/>
        <button id="qpSaveCfg" class="btn" style="width:100%;padding:10px;font-size:14px">Save Settings</button></div>`;
      document.getElementById("qpCfgClose").onclick=()=>c.style.display="none";
      c.querySelectorAll("[data-diff]").forEach(b=>b.onclick=()=>{qpConfig.difficulty=b.dataset.diff;document.getElementById("qpSettings").click();document.getElementById("qpSettings").click()});
      document.getElementById("qpSaveCfg").onclick=()=>{
        qpConfig.subject=document.getElementById("qpSubj").value;qpConfig.className=document.getElementById("qpClass").value;
        qpConfig.mcqs=Number(document.getElementById("qpMcq").value);qpConfig.shortAnswer=Number(document.getElementById("qpShort").value);
        qpConfig.longAnswer=Number(document.getElementById("qpLong").value);qpConfig.fillBlanks=Number(document.getElementById("qpFill").value);
        qpConfig.trueFalse=Number(document.getElementById("qpTf").value);qpConfig.totalMarks=Number(document.getElementById("qpMarks").value);
        qpConfig.timeAllowed=document.getElementById("qpTime").value;qpConfig.instructions=document.getElementById("qpInstr").value;
        c.style.display="none";
      };
    }
  });
  document.getElementById("qpGenerate")?.addEventListener("click",async()=>{
    showQpMsg("Generating question paper...",true);
    const prompt=`You are an expert teacher creating a question paper. Based on the following content, generate a well-structured question paper.

CONTENT:
${qpText.slice(0,15000)}

REQUIREMENTS:
- Subject: ${qpConfig.subject||"As per content"}, Class: ${qpConfig.className||"As per content"}
- Difficulty: ${qpConfig.difficulty}
- MCQs: ${qpConfig.mcqs}, Short Answer (2-3 marks): ${qpConfig.shortAnswer}, Long Answer (5 marks): ${qpConfig.longAnswer}
- Fill in Blanks: ${qpConfig.fillBlanks}, True/False: ${qpConfig.trueFalse}
- Total Marks: ${qpConfig.totalMarks}, Time: ${qpConfig.timeAllowed}
${qpConfig.instructions?`- Instructions: ${qpConfig.instructions}`:""}

FORMAT: SECTION A: MCQs, SECTION B: Fill Blanks, SECTION C: True/False, SECTION D: Short Answer, SECTION E: Long Answer, then ANSWER KEY.`;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const d=await res.json();const t=d?.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(t){qpPaper=t;showQpMsg("✅ Generated!");renderQPaper(el);}else showQpMsg("Failed to generate.");
    }catch{showQpMsg("Generation failed.");}
  });
  document.getElementById("qpDlPdf")?.addEventListener("click",()=>{
    if(!qpPaper)return;
    const{jsPDF}=window.jspdf;const doc=new jsPDF();const pw=doc.internal.pageSize.getWidth();
    doc.setFontSize(16);doc.setFont("helvetica","bold");doc.text(qpConfig.subject||"Question Paper",pw/2,20,{align:"center"});
    doc.setFontSize(10);doc.setFont("helvetica","normal");
    if(qpConfig.className)doc.text(`Class: ${qpConfig.className}`,20,30);
    doc.text(`Time: ${qpConfig.timeAllowed}`,pw-20,30,{align:"right"});doc.text(`Marks: ${qpConfig.totalMarks}`,pw-20,36,{align:"right"});
    doc.setDrawColor(0,150,200);doc.line(20,40,pw-20,40);
    const lines=doc.splitTextToSize(qpPaper,pw-40);let y=50;
    for(const line of lines){if(y>280){doc.addPage();y=20;}
      if(line.startsWith("SECTION")||line.startsWith("ANSWER KEY")){doc.setFont("helvetica","bold");doc.setFontSize(11);y+=4;}
      else{doc.setFont("helvetica","normal");doc.setFontSize(10);}
      doc.text(line,20,y);y+=5;}
    doc.setFontSize(7);doc.setTextColor(150);doc.text(`Generated by TeachMate on ${new Date().toLocaleDateString("en-IN")}`,pw/2,290,{align:"center"});
    doc.save(`Question_Paper_${qpConfig.subject||"Paper"}.pdf`);
  });
}
function showQpMsg(msg,loading){
  let el=document.getElementById("qpStatus");if(!el)return;
  el.style.display="flex";el.style.cssText="display:flex;align-items:center;gap:8px;padding:12px;border-radius:12px;background:hsla(190,90%,50%,.2);border:1px solid hsla(190,90%,50%,.3);font-size:14px;margin-bottom:12px";
  el.innerHTML=`${loading?'<div class="spinner" style="width:16px;height:16px;border-width:2px"></div>':""}${msg}`;
  if(!loading)setTimeout(()=>{if(el)el.style.display="none"},3000);
}

// ===== Nexus AI =====
let aiMessages=[{id:"welcome",role:"ai",text:"Hi! I'm Nexus AI, your teaching assistant. Ask me anything — explain topics, generate quizzes, or get classroom ideas! 🎓"}];
let aiLoading=false;
function renderAI(el){
  el.innerHTML=`<div style="display:flex;flex-direction:column;height:calc(100vh - 220px)">
    <div style="text-align:center;margin-bottom:12px"><h2 style="font-size:18px;font-weight:700" class="grad-text">Nexus AI</h2><p style="font-size:12px;color:var(--muted-fg)">Powered by Gemini · Your AI Teaching Assistant</p></div>
    <div id="aiChat" style="flex:1;overflow-y:auto;padding-right:4px" class="no-scroll"></div>
    <div style="display:flex;gap:8px;padding-top:8px"><input id="aiInput" placeholder="Ask Nexus AI anything..." style="flex:1;padding:12px 16px;border-radius:12px"/><button id="aiSend" class="btn" style="padding:12px;border-radius:12px">${icons.send}</button></div>
  </div>`;
  renderAIMessages();
  const send=async()=>{
    const inp=document.getElementById("aiInput");const txt=inp.value.trim();if(!txt||aiLoading)return;
    aiMessages.push({id:Date.now().toString(),role:"user",text:txt});inp.value="";aiLoading=true;renderAIMessages();
    try{
      const hist=aiMessages.filter(m=>m.id!=="welcome").map(m=>({role:m.role==="user"?"user":"model",parts:[{text:m.text}]}));
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({systemInstruction:{parts:[{text:"You are Nexus AI, a friendly teaching assistant. Help with explanations, quizzes, lesson planning. Be concise and practical."}]},contents:hist})
      });
      const d=await res.json();const t=d?.candidates?.[0]?.content?.parts?.[0]?.text||"Sorry, couldn't process that.";
      aiMessages.push({id:(Date.now()+1).toString(),role:"ai",text:t});
    }catch{aiMessages.push({id:(Date.now()+1).toString(),role:"ai",text:"Something went wrong. Try again."});}
    aiLoading=false;renderAIMessages();
  };
  document.getElementById("aiSend").onclick=send;
  document.getElementById("aiInput").onkeydown=e=>{if(e.key==="Enter")send()};
}

function renderAIMessages(){
  const chat=document.getElementById("aiChat");if(!chat)return;
  chat.innerHTML=aiMessages.map(m=>`<div style="display:flex;gap:8px;margin-bottom:12px;${m.role==="user"?"justify-content:flex-end":"justify-content:flex-start"}">
    ${m.role==="ai"?`<div style="width:28px;height:28px;border-radius:8px;background:hsla(190,90%,50%,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px"><span style="color:var(--primary)">${icons.bot}</span></div>`:""}
    <div style="max-width:80%;padding:12px;border-radius:16px;font-size:14px;line-height:1.5;white-space:pre-wrap;${m.role==="user"?"background:linear-gradient(135deg,hsl(190,90%,50%),hsl(200,90%,45%));color:var(--primary-fg);border-bottom-right-radius:4px":"background:hsla(230,40%,22%,.4);border:1px solid hsla(210,40%,96%,.1);border-bottom-left-radius:4px"}">${m.text}</div>
    ${m.role==="user"?`<div style="width:28px;height:28px;border-radius:8px;background:hsla(280,70%,60%,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px"><span style="color:var(--accent)">${icons.user}</span></div>`:""}
  </div>`).join("")+
  (aiLoading?`<div style="display:flex;gap:8px"><div style="width:28px;height:28px;border-radius:8px;background:hsla(190,90%,50%,.2);display:flex;align-items:center;justify-content:center"><span style="color:var(--primary)">${icons.bot}</span></div><div class="glass-l" style="padding:12px;border-radius:16px;border-bottom-left-radius:4px"><span class="dot"></span> <span class="dot" style="animation-delay:150ms"></span> <span class="dot" style="animation-delay:300ms"></span></div></div>`:"");
  chat.scrollTop=chat.scrollHeight;
}
</script>
